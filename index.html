<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badminton Match Maker Pro v3.3</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background-color: #f4f7f6; color: #333; }
        .header { background-color: #2c3e50; color: white; padding: 15px 20px; text-align: center; font-size: 1.2rem; font-weight: bold; }
        .tab-menu { display: flex; background-color: #34495e; overflow-x: auto; }
        .tab-btn { flex: 1; min-width: 100px; padding: 12px 0; background: none; border: none; color: white; cursor: pointer; font-size: 1rem; }
        .tab-btn.active { background-color: #3498db; font-weight: bold; }
        .container { max-width: 800px; margin: 20px auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        h2 { color: #2c3e50; font-size: 1.1rem; border-bottom: 2px solid #3498db; padding-bottom: 5px; margin-top: 0; display: flex; justify-content: space-between; align-items: center; }
        .section { margin-bottom: 20px; padding: 15px; background: #fdfdfd; border: 1px solid #eee; border-radius: 5px; }
        button { background-color: #3498db; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 14px; margin: 5px 0; }
        button:hover { background-color: #2980b9; }
        .btn-danger { background-color: #e74c3c; }
        .btn-danger:hover { background-color: #c0392b; }
        .btn-edit { background-color: #f39c12; }
        .btn-pay { background-color: #ff0033; font-weight: bold; } /* PayPayカラー風 */
        .controls { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 10px; }
        input[type="text"], input[type="number"], select { padding: 8px; border-radius: 4px; border: 1px solid #ccc; font-size: 14px; }
        
        /* 出欠カードのデザイン調整 */
        .member-card { border: 1px solid #ddd; border-radius: 5px; padding: 10px; margin: 5px; display: inline-block; width: calc(50% - 35px); vertical-align: top; background: #fff; }
        .status-btn { width: 100%; padding: 8px 0; border-radius: 4px; border: none; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .status-active { background-color: #2ecc71; color: white; }
        .status-inactive { background-color: #ecf0f1; color: #7f8c8d; }
        .pay-done { background-color: #f1c40f; color: white; }
        .pay-wait { background-color: #ecf0f1; color: #7f8c8d; border: 1px dashed #bdc3c7; }

        .court-card { border: 2px solid #3498db; padding: 10px; border-radius: 8px; margin-bottom: 15px; background-color: #f8fbfd; }
        .player-slot { background: white; padding: 5px; margin: 3px 0; border-radius: 3px; border: 1px dashed #ccc; font-size: 0.9rem;}
        .history-card { border: 1px solid #ddd; padding: 10px; border-radius: 5px; margin-bottom: 10px; }
        .history-date { font-weight: bold; color: #3498db; margin-bottom: 5px; }
        .checkbox-group { display: flex; flex-wrap: wrap; gap: 10px; background: #fff; padding: 10px; border: 1px solid #ccc; border-radius: 4px; max-height: 100px; overflow-y: auto;}
    </style>
</head>
<body>

<div class="header">🏸 Badminton Match Maker Pro v3.3</div>
<div class="tab-menu">
    <button class="tab-btn active" onclick="app.switchTab('tab-play')">今日の練習</button>
    <button class="tab-btn" onclick="app.switchTab('tab-members')">名簿管理</button>
    <button class="tab-btn" onclick="app.switchTab('tab-groups')">練習会管理</button>
    <button class="tab-btn" onclick="app.switchTab('tab-history')">過去の履歴</button>
</div>

<div class="container">
    
    <div id="tab-play" class="tab-content active">
        <div class="section" id="setup-section">
            <h2>練習の開始</h2>
            <div class="controls">
                <select id="session-group-select"></select>
                <label>コート数: <input type="number" id="court-count" value="3" min="1" max="10" style="width: 50px;"></label>
                <button onclick="app.initSession()">出席を取る</button>
            </div>
        </div>

        <div class="section" id="attendance-section" style="display:none;">
            <h2>
                <span>出欠・集金管理 (<span id="current-session-group-name"></span>)</span>
                <button id="paypay-link-btn" class="btn-pay" style="display:none; font-size: 0.8rem;" onclick="app.openPayPay()">PayPayで集金</button>
            </h2>
            <div id="member-ui"></div>
            <div style="margin-top: 15px; border-top: 1px solid #eee; padding-top: 15px;">
                <button onclick="app.generateMatches()" style="font-size: 1.1rem; font-weight: bold; width: 100%;">次の組み合わせを生成</button>
            </div>
        </div>

        <div class="section" id="match-section" style="display:none;">
            <h2>進行中のゲーム (Game <span id="game-number">1</span>)</h2>
            <div id="courts-ui"></div>
            <div style="text-align: right; margin-top: 20px;">
                <button class="btn-danger" onclick="app.endSession()">練習を終了して記録を保存</button>
            </div>
        </div>
    </div>

    <div id="tab-members" class="tab-content">
        <div class="section">
            <h2 id="form-title">新規メンバー登録</h2>
            <div class="controls">
                <input type="text" id="new-name" placeholder="名前" style="width: 120px;">
                <select id="new-gender"><option value="M">男性</option><option value="F">女性</option></select>
                <select id="new-rank">
                    <option value="A">ランクA</option><option value="B">ランクB</option>
                    <option value="C" selected>ランクC</option><option value="D">ランクD</option>
                </select>
            </div>
            <div style="margin-bottom: 5px; font-size: 0.9rem;">所属する練習会を選択:</div>
            <div class="checkbox-group" id="new-member-groups"></div>
            <button id="submit-member-btn" onclick="app.submitMember()" style="margin-top: 10px;">メンバーを追加</button>
            <button id="cancel-edit-btn" onclick="app.resetForm()" style="margin-top: 10px; display: none; background:#95a5a6;">キャンセル</button>
        </div>
        <div class="section">
            <h2>登録メンバー一覧</h2>
            <div id="member-database-ui" style="max-height: 400px; overflow-y: auto;"></div>
        </div>
    </div>

    <div id="tab-groups" class="tab-content">
        <div class="section">
            <h2>新しい練習会の追加</h2>
            <div class="controls">
                <input type="text" id="new-group-name" placeholder="例: ミナクサ会" style="width: 150px;">
                <input type="text" id="new-group-paypay" placeholder="PayPayリンク (任意)" style="width: 200px;">
                <button onclick="app.addGroup()">練習会を追加</button>
            </div>
        </div>
        <div class="section">
            <h2>登録済みの練習会</h2>
            <div id="group-list-ui"></div>
        </div>
    </div>

    <div id="tab-history" class="tab-content">
        <div class="section">
            <h2>練習会履歴</h2>
            <div id="history-ui"></div>
        </div>
    </div>

</div>

<script>
const app = {
    members: [],
    groups: [], // [{name: 'ミナクサ会', paypayLink: 'https://...'}] の形式に変更
    history: [],
    currentSession: null,
    editingMemberId: null,
    
    rankToRating: { 'A': 1600, 'B': 1500, 'C': 1400, 'D': 1300 },
    ratingToRank: { 1600: 'A', 1500: 'B', 1400: 'C', 1300: 'D' },

    getRank(rating) {
        if (rating >= 1550) return 'A';
        if (rating >= 1450) return 'B';
        if (rating >= 1350) return 'C';
        return 'D';
    },

    init() {
        const savedMembers = localStorage.getItem('bm_members_v3');
        const savedGroups = localStorage.getItem('bm_groups_v3');
        const savedHistory = localStorage.getItem('bm_history_v3');
        
        if (savedMembers) this.members = JSON.parse(savedMembers);
        if (savedHistory) this.history = JSON.parse(savedHistory);
        
        // グループデータの互換性マイグレーション（文字列配列からオブジェクト配列へ）
        if (savedGroups) {
            let parsedGroups = JSON.parse(savedGroups);
            this.groups = parsedGroups.map(g => typeof g === 'string' ? { name: g, paypayLink: '' } : g);
        }

        this.members.forEach(m => {
            if (!m.groups) m.groups = m.group ? [m.group] : [];
        });
        
        this.renderAll();
    },

    saveData() {
        localStorage.setItem('bm_members_v3', JSON.stringify(this.members));
        localStorage.setItem('bm_groups_v3', JSON.stringify(this.groups));
        localStorage.setItem('bm_history_v3', JSON.stringify(this.history));
    },

    renderAll() {
        this.renderGroups();
        this.renderDatabase();
        this.renderHistory();
        this.updateGroupSelects();
    },

    switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        const activeBtn = document.querySelector(`.tab-btn[onclick="app.switchTab('${tabId}')"]`);
        if(activeBtn) activeBtn.classList.add('active');
    },

    // --- グループ管理 ---
    addGroup() {
        const name = document.getElementById('new-group-name').value.trim();
        const paypayLink = document.getElementById('new-group-paypay').value.trim();
        
        if (!name) return alert('練習会名を入力してください');
        if (this.groups.some(g => g.name === name)) return alert('その練習会は既に存在します');
        
        this.groups.push({ name: name, paypayLink: paypayLink });
        document.getElementById('new-group-name').value = '';
        document.getElementById('new-group-paypay').value = '';
        this.saveData();
        this.renderAll();
    },

    deleteGroup(groupName) {
        if(confirm(`「${groupName}」を削除しますか？`)) {
            this.groups = this.groups.filter(g => g.name !== groupName);
            this.members.forEach(m => { m.groups = m.groups.filter(g => g !== groupName); });
            this.saveData();
            this.renderAll();
        }
    },

    renderGroups() {
        const ui = document.getElementById('group-list-ui');
        ui.innerHTML = this.groups.map(g => `
            <div style="border-bottom: 1px solid #eee; padding: 10px 0; display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <b>${g.name}</b><br>
                    <small style="color:#666;">PayPay: ${g.paypayLink ? '設定済' : '未設定'}</small>
                </div>
                <button class="btn-danger" style="padding: 4px 8px; font-size: 0.8rem;" onclick="app.deleteGroup('${g.name}')">削除</button>
            </div>
        `).join('') || '<p style="color:#777;">練習会が登録されていません。</p>';
    },

    updateGroupSelects() {
        const playSelect = document.getElementById('session-group-select');
        playSelect.innerHTML = this.groups.length > 0 ? '' : '<option value="">練習会を登録してください</option>';
        this.groups.forEach(g => { playSelect.innerHTML += `<option value="${g.name}">${g.name}</option>`; });

        const memberGroupsUi = document.getElementById('new-member-groups');
        memberGroupsUi.innerHTML = this.groups.map(g => `
            <label><input type="checkbox" value="${g.name}" class="new-member-group-chk"> ${g.name}</label>
        `).join('') || '<span style="color:#777; font-size:0.9rem;">先に練習会を作成してください。</span>';
    },

    // --- メンバー管理 ---
    submitMember() {
        const name = document.getElementById('new-name').value.trim();
        const gender = document.getElementById('new-gender').value;
        const rank = document.getElementById('new-rank').value;
        const checkedGroups = Array.from(document.querySelectorAll('.new-member-group-chk:checked')).map(cb => cb.value);

        if (!name) return alert('名前を入力してください');

        if (this.editingMemberId) {
            const m = this.members.find(x => x.id === this.editingMemberId);
            if (m) { m.name = name; m.gender = gender; m.rating = this.rankToRating[rank]; m.groups = checkedGroups; }
        } else {
            this.members.push({
                id: Date.now(), name, gender, groups: checkedGroups,
                rating: this.rankToRating[rank], active: false, playCount: 0
            });
        }
        this.resetForm();
        this.saveData();
        this.renderDatabase();
    },

    editMember(id) {
        const m = this.members.find(x => x.id === id);
        if (!m) return;
        this.editingMemberId = id;
        document.getElementById('form-title').innerText = 'メンバー情報の編集';
        document.getElementById('new-name').value = m.name;
        document.getElementById('new-gender').value = m.gender;
        document.getElementById('new-rank').value = this.ratingToRank[m.rating] || 'C';
        document.querySelectorAll('.new-member-group-chk').forEach(cb => { cb.checked = m.groups.includes(cb.value); });
        
        const submitBtn = document.getElementById('submit-member-btn');
        submitBtn.innerText = '情報を更新する';
        submitBtn.classList.add('btn-edit');
        document.getElementById('cancel-edit-btn').style.display = 'inline-block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    },

    resetForm() {
        this.editingMemberId = null;
        document.getElementById('form-title').innerText = '新規メンバー登録';
        document.getElementById('new-name').value = '';
        document.getElementById('new-rank').value = 'C';
        document.querySelectorAll('.new-member-group-chk').forEach(cb => cb.checked = false);
        
        const submitBtn = document.getElementById('submit-member-btn');
        submitBtn.innerText = 'メンバーを追加';
        submitBtn.classList.remove('btn-edit');
        document.getElementById('cancel-edit-btn').style.display = 'none';
    },

    deleteMember(id) {
        if(confirm('完全に削除しますか？')) {
            this.members = this.members.filter(m => m.id !== id);
            this.saveData();
            this.renderDatabase();
        }
    },

    renderDatabase() {
        const ui = document.getElementById('member-database-ui');
        ui.innerHTML = this.members.map(m => `
            <div style="border-bottom: 1px solid #eee; padding: 10px 0; display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <b>${m.name}</b> (${m.gender}, Rank: ${this.getRank(m.rating)})<br>
                    <small style="color: #666;">所属: ${m.groups.length > 0 ? m.groups.join(', ') : 'なし'}</small>
                </div>
                <div style="display: flex; gap: 5px;">
                    <button class="btn-edit" style="padding: 5px 10px;" onclick="app.editMember(${m.id})">編集</button>
                    <button class="btn-danger" style="padding: 5px 10px;" onclick="app.deleteMember(${m.id})">削除</button>
                </div>
            </div>
        `).join('') || '<p>メンバーがいません</p>';
    },

    // --- 今日の練習（セッション） ---
    initSession() {
        const targetGroupName = document.getElementById('session-group-select').value;
        if (!targetGroupName) return alert('練習会を選択してください。');

        const targetGroupObj = this.groups.find(g => g.name === targetGroupName);
        const courts = parseInt(document.getElementById('court-count').value);
        let targetMembers = this.members.filter(m => m.groups.includes(targetGroupName));
        
        if(targetMembers.length === 0) return alert(`${targetGroupName}に所属するメンバーがいません。`);

        this.members.forEach(m => { m.active = false; m.playCount = 0; });
        targetMembers.forEach(m => m.active = true);

        const now = new Date();
        this.currentSession = {
            date: now.toLocaleDateString(),
            time: now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
            group: targetGroupName,
            paypayLink: targetGroupObj ? targetGroupObj.paypayLink : '',
            courts: courts,
            gameCount: 1,
            matches: [],
            payments: {} // { memberId: true/false } 集金管理用
        };

        document.getElementById('current-session-group-name').innerText = targetGroupName;
        
        const payBtn = document.getElementById('paypay-link-btn');
        if(this.currentSession.paypayLink) {
            payBtn.style.display = 'inline-block';
        } else {
            payBtn.style.display = 'none';
        }

        document.getElementById('setup-section').style.display = 'none';
        document.getElementById('attendance-section').style.display = 'block';
        document.getElementById('match-section').style.display = 'block';
        this.renderAttendance();
    },

    openPayPay() {
        if(this.currentSession && this.currentSession.paypayLink) {
            window.open(this.currentSession.paypayLink, '_blank');
        }
    },

    toggleStatus(id) {
        const m = this.members.find(m => m.id === id);
        if (m) { m.active = !m.active; this.renderAttendance(); }
    },

    togglePayment(id) {
        if(this.currentSession) {
            this.currentSession.payments[id] = !this.currentSession.payments[id];
            this.renderAttendance();
        }
    },

    renderAttendance() {
        const ui = document.getElementById('member-ui');
        const sessionMembers = this.members.filter(m => m.groups.includes(this.currentSession.group));
        
        ui.innerHTML = sessionMembers.map(m => `
            <div class="member-card">
                <div style="font-weight: bold; font-size: 1.05rem; margin-bottom: 5px;">${m.name}</div>
                <div style="font-size: 0.8rem; color: #666; margin-bottom: 8px;">待機: ${m.playCount}回</div>
                
                <button class="status-btn ${m.active ? 'status-active' : 'status-inactive'}" onclick="app.toggleStatus(${m.id})">
                    ${m.active ? '出席' : '休み'}
                </button>
                
                ${m.active ? `
                <button class="status-btn ${this.currentSession.payments[m.id] ? 'pay-done' : 'pay-wait'}" onclick="app.togglePayment(${m.id})">
                    ${this.currentSession.payments[m.id] ? '集金済' : '未納'}
                </button>
                ` : ''}
            </div>
        `).join('');
    },

    generateMatches() {
        if(!this.currentSession) return;
        const activeMembers = this.members.filter(m => m.active);
        const needed = this.currentSession.courts * 4;

        if (activeMembers.length < needed) return alert(`人数が足りません（必要:${needed}人、現在参加中:${activeMembers.length}人）`);

        let selected = [...activeMembers].sort((a, b) => a.playCount - b.playCount).slice(0, needed);
        selected.forEach(p => { const m = this.members.find(x => x.id === p.id); if(m) m.playCount++; });
        selected.sort((a, b) => b.rating - a.rating);

        const ui = document.getElementById('courts-ui');
        ui.innerHTML = '';
        let currentMatchRecord = { game: this.currentSession.gameCount, courts: [] };

        for (let i = 0; i < this.currentSession.courts; i++) {
            const players = [selected[i], selected[i + this.currentSession.courts], selected[i + this.currentSession.courts * 2], selected[i + this.currentSession.courts * 3]];
            currentMatchRecord.courts.push(players.map(p => p.name));
            
            ui.innerHTML += `
                <div class="court-card">
                    <h3 style="margin-top:0;">第 ${i + 1} コート</h3>
                    ${players.map(p => `<div class="player-slot">${p.name} (${p.gender}, Rank: ${this.getRank(p.rating)})</div>`).join('')}
                </div>
            `;
        }

        this.currentSession.matches.push(currentMatchRecord);
        this.renderAttendance();
        document.getElementById('game-number').innerText = this.currentSession.gameCount++;
    },

    endSession() {
        if(confirm('練習会を終了して記録を保存しますか？')) {
            if(this.currentSession && this.currentSession.matches.length > 0) {
                this.history.unshift(this.currentSession);
                this.saveData();
                this.renderHistory();
            }
            document.getElementById('setup-section').style.display = 'block';
            document.getElementById('attendance-section').style.display = 'none';
            document.getElementById('match-section').style.display = 'none';
            this.currentSession = null;
            this.switchTab('tab-history');
        }
    },

    renderHistory() {
        const ui = document.getElementById('history-ui');
        ui.innerHTML = this.history.map(h => `
            <div class="history-card">
                <div class="history-date">${h.date} ${h.time} (${h.group}) - 全${h.matches.length}ゲーム</div>
                <div style="font-size: 0.9rem; color: #555;">
                    ${h.matches.map(m => `<b>Game ${m.game}:</b> ${m.courts.map((c, i) => `[C${i+1}] ${c.join(', ')}`).join(' / ')}`).join('<br>')}
                </div>
            </div>
        `).join('') || '<p style="color:#777;">過去の履歴はありません。</p>';
    }
};

window.onload = () => app.init();
</script>
</body>
</html>
