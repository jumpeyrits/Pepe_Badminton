<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badminton Match Maker Pro</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 20px; background-color: #f4f7f6; color: #333; }
        h1, h2 { color: #2c3e50; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .section { margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #eee; }
        button { background-color: #3498db; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-size: 16px; margin: 5px; }
        button:hover { background-color: #2980b9; }
        .toggle-btn.active { background-color: #2ecc71; }
        .toggle-btn.inactive { background-color: #e74c3c; }
        .member-list, .court-list { display: flex; flex-wrap: wrap; gap: 10px; }
        .member-card { border: 1px solid #ddd; padding: 10px; border-radius: 5px; width: calc(50% - 10px); display: flex; justify-content: space-between; align-items: center; }
        .court-card { border: 2px solid #3498db; padding: 15px; border-radius: 8px; width: 100%; margin-bottom: 15px; background-color: #f8fbfd; }
        .player-slot { background: white; padding: 5px; margin: 5px 0; border-radius: 3px; border: 1px dashed #ccc; }
        .controls { display: flex; gap: 10px; align-items: center; }
        select, input { padding: 8px; font-size: 16px; border-radius: 4px; border: 1px solid #ccc; }
    </style>
</head>
<body>

<div class="container">
    <h1>Badminton Match Maker</h1>
    
    <div class="section" id="setup-section">
        <h2>1. 練習会設定</h2>
        <div class="controls">
            <select id="group-select">
                <option value="minakusa">ミナクサ会</option>
                <option value="phoenix">フェニックス</option>
            </select>
            <label>面数: <input type="number" id="court-count" value="3" min="1" max="10" style="width: 50px;"></label>
            <button onclick="app.initSession()">開始</button>
        </div>
    </div>

    <div class="section" id="attendance-section" style="display:none;">
        <h2>2. 出欠・ステータス管理</h2>
        <p>※タップで参加/お休み（中抜け）を切り替え</p>
        <div class="member-list" id="member-ui"></div>
    </div>

    <div class="section" id="match-section" style="display:none;">
        <h2>3. 組み合わせ生成 (Game <span id="game-number">1</span>)</h2>
        <div class="controls">
            <button onclick="app.generateMatches()">次の試合を自動生成</button>
            <label><input type="checkbox" id="mix-mode"> ミックス優先</label>
        </div>
        <div id="courts-ui" style="margin-top: 20px;"></div>
    </div>
</div>

<script>
// モックデータ: 内部レーティング1500基準
const mockMembers = Array.from({length: 18}, (_, i) => ({
    id: i + 1,
    name: `プレイヤー${i + 1}`,
    gender: i % 3 === 0 ? 'F' : 'M',
    rating: 1400 + Math.floor(Math.random() * 200), // 1400~1600
    active: true,
    playCount: 0
}));

const app = {
    members: mockMembers,
    courts: 3,
    gameCount: 1,
    resultQueue: [], // n+3反映用キュー

    getRank(rating) {
        if (rating >= 1550) return 'A';
        if (rating >= 1500) return 'B';
        if (rating >= 1450) return 'C';
        return 'D';
    },

    initSession() {
        this.courts = parseInt(document.getElementById('court-count').value);
        document.getElementById('attendance-section').style.display = 'block';
        document.getElementById('match-section').style.display = 'block';
        this.renderMembers();
    },

    toggleStatus(id) {
        const member = this.members.find(m => m.id === id);
        if (member) {
            member.active = !member.active;
            this.renderMembers();
        }
    },

    renderMembers() {
        const ui = document.getElementById('member-ui');
        ui.innerHTML = '';
        this.members.forEach(m => {
            const btn = document.createElement('button');
            btn.className = `toggle-btn ${m.active ? 'active' : 'inactive'}`;
            btn.innerHTML = `${m.name} (Rank: ${this.getRank(m.rating)}) <br><small>試合数: ${m.playCount}</small>`;
            btn.onclick = () => this.toggleStatus(m.id);
            ui.appendChild(btn);
        });
    },

    generateMatches() {
        // n+3 レーティング反映ロジック (Game数が 現在-3 のキューを処理)
        this.processRatingQueue();

        const activeMembers = this.members.filter(m => m.active);
        const neededPlayers = this.courts * 4;

        if (activeMembers.length < neededPlayers) {
            alert(`アクティブなメンバー（${activeMembers.length}人）が、必要な人数（${neededPlayers}人）を満たしていません。面数を減らしてください。`);
            return;
        }

        // 試合数の少ない人を優先して選出（平準化）
        let sortedMembers = [...activeMembers].sort((a, b) => a.playCount - b.playCount);
        let selectedPlayers = sortedMembers.slice(0, neededPlayers);
        
        // 選ばれた人のプレイ回数を加算
        selectedPlayers.forEach(p => {
            const member = this.members.find(m => m.id === p.id);
            if(member) member.playCount++;
        });

        // 簡易的なレベル分散ロジック (強順に並べて散らす)
        selectedPlayers.sort((a, b) => b.rating - a.rating);

        const courtsUi = document.getElementById('courts-ui');
        courtsUi.innerHTML = '';

        for (let i = 0; i < this.courts; i++) {
            // 各コートに強さを分散して4人配置 (手動入れ替えを想定したUI枠)
            const courtPlayers = [
                selectedPlayers[i], // 強い層
                selectedPlayers[i + this.courts],
                selectedPlayers[i + this.courts * 2],
                selectedPlayers[i + this.courts * 3] // 弱い層
            ];

            const courtDiv = document.createElement('div');
            courtDiv.className = 'court-card';
            courtDiv.innerHTML = `<h3>第 ${i + 1} コート</h3>`;
            
            courtPlayers.forEach(p => {
                courtDiv.innerHTML += `<div class="player-slot">・${p.name} (Rank: ${this.getRank(p.rating)}, ${p.gender})</div>`;
            });
            
            // スコア入力UI (モック)
            courtDiv.innerHTML += `
                <div style="margin-top:10px;">
                    <input type="number" placeholder="ペア1得点" style="width:70px;"> - 
                    <input type="number" placeholder="ペア2得点" style="width:70px;">
                    <button onclick="alert('スコアをキューに保存しました (n+3で反映)')">結果登録</button>
                </div>
            `;
            courtsUi.appendChild(courtDiv);
        }

        this.renderMembers();
        this.gameCount++;
        document.getElementById('game-number').innerText = this.gameCount;
    },

    processRatingQueue() {
        // 実装予定: this.resultQueue から gameCount - 3 のデータを取り出し、イロレーティング等で this.members の rating を更新する
        console.log(`Game ${this.gameCount}: 過去のレーティング変動キューをチェック・反映しました。`);
    }
};
</script>
</body>
</html>
