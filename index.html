<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badminton Match Maker Pro</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 20px; background-color: #f4f7f6; color: #333; }
        h1, h2 { color: #2c3e50; font-size: 1.2rem; border-bottom: 2px solid #3498db; padding-bottom: 5px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .section { margin-bottom: 30px; padding: 15px; background: #fdfdfd; border: 1px solid #eee; border-radius: 5px; }
        button { background-color: #3498db; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 14px; margin: 5px 0; }
        button:hover { background-color: #2980b9; }
        .btn-danger { background-color: #e74c3c; }
        .toggle-btn { margin: 5px; padding: 10px; border-radius: 5px; border: 1px solid #ccc; cursor: pointer; display: inline-block; width: calc(50% - 25px); text-align: center;}
        .toggle-btn.active { background-color: #2ecc71; color: white; border-color: #27ae60; }
        .toggle-btn.inactive { background-color: #ecf0f1; color: #7f8c8d; }
        .court-list { display: flex; flex-wrap: wrap; gap: 10px; }
        .court-card { border: 2px solid #3498db; padding: 10px; border-radius: 8px; width: 100%; margin-bottom: 15px; background-color: #f8fbfd; }
        .player-slot { background: white; padding: 5px; margin: 3px 0; border-radius: 3px; border: 1px dashed #ccc; font-size: 0.9rem;}
        .controls { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 10px; }
        select, input[type="text"], input[type="number"] { padding: 8px; font-size: 14px; border-radius: 4px; border: 1px solid #ccc; }
        .member-management-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding: 5px 0; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏸 Badminton Match Maker</h1>
    
    <div class="section" id="member-setup-section">
        <h2>1. メンバー名簿の管理</h2>
        <div class="controls">
            <input type="text" id="new-name" placeholder="名前" style="width: 100px;">
            <select id="new-gender">
                <option value="M">男性</option>
                <option value="F">女性</option>
            </select>
            <select id="new-rank">
                <option value="A">ランクA (上級)</option>
                <option value="B">ランクB (中上級)</option>
                <option value="C" selected>ランクC (中級)</option>
                <option value="D">ランクD (初級)</option>
            </select>
            <button onclick="app.addMember()">追加</button>
        </div>
        <div id="member-database-ui" style="max-height: 150px; overflow-y: auto; background: #fff; padding: 10px; border: 1px solid #ddd;">
            </div>
    </div>

    <div class="section" id="setup-section">
        <h2>2. 今日の練習設定</h2>
        <div class="controls">
            <label>使用コート数: <input type="number" id="court-count" value="3" min="1" max="10" style="width: 50px;"></label>
            <button onclick="app.initSession()">練習を開始する</button>
        </div>
    </div>

    <div class="section" id="attendance-section" style="display:none;">
        <h2>3. 本日の出欠・お休み管理</h2>
        <p style="font-size: 0.8rem; color: #666;">※タップで「参加」と「お休み（中抜け）」を切り替えます。緑が参加です。</p>
        <div id="member-ui"></div>
    </div>

    <div class="section" id="match-section" style="display:none;">
        <h2>4. 組み合わせ (Game <span id="game-number">1</span>)</h2>
        <div class="controls">
            <button onclick="app.generateMatches()" style="font-size: 1.1rem; padding: 10px 20px; font-weight: bold;">次の組み合わせを生成</button>
        </div>
        <div id="courts-ui" style="margin-top: 15px;"></div>
    </div>
</div>

<script>
const app = {
    members: [],
    courts: 3,
    gameCount: 1,

    // 内部レーティングへの変換マスタ
    rankToRating: { 'A': 1600, 'B': 1500, 'C': 1400, 'D': 1300 },
    
    getRank(rating) {
        if (rating >= 1550) return 'A';
        if (rating >= 1450) return 'B';
        if (rating >= 1350) return 'C';
        return 'D';
    },

    // 初期化：保存されたデータを読み込む
    init() {
        const savedData = localStorage.getItem('badminton_members_v1');
        if (savedData) {
            this.members = JSON.parse(savedData);
        }
        this.renderDatabase();
    },

    // データの保存
    saveData() {
        localStorage.setItem('badminton_members_v1', JSON.stringify(this.members));
    },

    // メンバーの追加
    addMember() {
        const nameInput = document.getElementById('new-name');
        const gender = document.getElementById('new-gender').value;
        const rank = document.getElementById('new-rank').value;
        const name = nameInput.value.trim();

        if (!name) return alert('名前を入力してください');

        this.members.push({
            id: Date.now(), // 一意のID
            name: name,
            gender: gender,
            rating: this.rankToRating[rank],
            active: false, // デフォルトは欠席状態
            playCount: 0
        });

        nameInput.value = '';
        this.saveData();
        this.renderDatabase();
    },

    // メンバーの削除
    deleteMember(id) {
        if(confirm('このメンバーを名簿から削除しますか？')) {
            this.members = this.members.filter(m => m.id !== id);
            this.saveData();
            this.renderDatabase();
        }
    },

    // 名簿UIの描画
    renderDatabase() {
        const ui = document.getElementById('member-database-ui');
        ui.innerHTML = '';
        if(this.members.length === 0) {
            ui.innerHTML = '<span style="color:#999;">メンバーが登録されていません。上のフォームから追加してください。</span>';
            return;
        }
        this.members.forEach(m => {
            ui.innerHTML += `
                <div class="member-management-item">
                    <span>${m.name} (${m.gender}, Rank: ${this.getRank(m.rating)})</span>
                    <button class="btn
