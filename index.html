<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badminton Match Maker Pro v4.1</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background-color: #f4f7f6; color: #333; }
        .header { background-color: #2c3e50; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .header-title { font-size: 1.2rem; font-weight: bold; }
        .lang-select { padding: 5px; border-radius: 4px; border: none; font-size: 0.9rem; background: #34495e; color: white; cursor: pointer; }
        .tab-menu { display: flex; background-color: #34495e; overflow-x: auto; }
        .tab-btn { flex: 1; min-width: 100px; padding: 12px 0; background: none; border: none; color: white; cursor: pointer; font-size: 1rem; }
        .tab-btn.active { background-color: #3498db; font-weight: bold; }
        .container { max-width: 800px; margin: 20px auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        h2 { color: #2c3e50; font-size: 1.1rem; border-bottom: 2px solid #3498db; padding-bottom: 5px; margin-top: 0; display: flex; justify-content: space-between; align-items: center; }
        .section { margin-bottom: 20px; padding: 15px; background: #fdfdfd; border: 1px solid #eee; border-radius: 5px; }
        button { background-color: #3498db; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 14px; margin: 5px 0; }
        button:hover { background-color: #2980b9; }
        .btn-danger { background-color: #e74c3c; }
        .btn-danger:hover { background-color: #c0392b; }
        .btn-edit { background-color: #f39c12; }
        .btn-pay { background-color: #ff0033; font-weight: bold; }
        .btn-success { background-color: #2ecc71; }
        .controls { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 10px; }
        input[type="text"], input[type="number"], select { padding: 8px; border-radius: 4px; border: 1px solid #ccc; font-size: 14px; }
        
        .member-card { border: 1px solid #ddd; border-radius: 5px; padding: 10px; margin: 5px; display: inline-block; width: calc(50% - 35px); vertical-align: top; background: #fff; }
        .status-btn { width: 100%; padding: 8px 0; border-radius: 4px; border: none; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .status-active { background-color: #2ecc71; color: white; }
        .status-inactive { background-color: #ecf0f1; color: #7f8c8d; }
        .pay-done { background-color: #f1c40f; color: white; }
        .pay-wait { background-color: #ecf0f1; color: #7f8c8d; border: 1px dashed #bdc3c7; }

        .court-card { border: 2px solid #3498db; padding: 10px; border-radius: 8px; margin-bottom: 15px; background-color: #f8fbfd; position: relative; }
        .team-box { background: white; padding: 5px; border-radius: 3px; border: 1px dashed #ccc; margin-bottom: 5px;}
        .score-input-area { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px; padding-top: 10px; border-top: 1px dotted #ccc; }
        .edit-match-btn { position: absolute; top: 10px; right: 10px; background: #95a5a6; padding: 4px 8px; font-size: 0.8rem; }
        
        .history-card { border: 1px solid #ddd; padding: 15px; border-radius: 5px; margin-bottom: 15px; background: #fff; }
        .history-date { font-weight: bold; color: #2c3e50; border-bottom: 1px solid #eee; padding-bottom: 5px; margin-bottom: 10px; }
        .history-game { margin-bottom: 10px; padding: 10px; background: #f9f9f9; border-radius: 4px; }
        .history-match { display: flex; align-items: center; justify-content: space-between; font-size: 0.9rem; margin-bottom: 5px; }
        .score-box { font-weight: bold; background: #34495e; color: white; padding: 2px 8px; border-radius: 10px; }
        .synergy-box { background: #e8f4f8; padding: 15px; border-radius: 8px; border: 1px solid #bce0ee; margin-bottom: 15px; }
        
        #qr-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; }
        #qr-modal img { max-width: 80%; max-height: 60vh; background: white; padding: 10px; border-radius: 10px; margin-bottom: 20px; }
        
        /* 翻訳除外用クラスの念押し設定 */
        .notranslate { white-space: nowrap; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-title">🏸 Badminton Match Maker Pro</div>
    <select id="lang-select" class="lang-select" onchange="app.changeLang(this.value)">
        <option value="ja">🇯🇵 日本語</option>
        <option value="en">🇺🇸 English</option>
        <option value="zh">🇨🇳 中文</option>
        <option value="id">🇮🇩 Bahasa Indonesia</option>
    </select>
</div>
<div class="tab-menu">
    <button class="tab-btn active" onclick="app.switchTab('tab-play')" data-i18n="tab_play">今日の練習</button>
    <button class="tab-btn" onclick="app.switchTab('tab-members')" data-i18n="tab_members">名簿管理</button>
    <button class="tab-btn" onclick="app.switchTab('tab-groups')" data-i18n="tab_groups">クラブ・練習会管理</button>
    <button class="tab-btn" onclick="app.switchTab('tab-history')" data-i18n="tab_history">過去の履歴</button>
</div>

<div id="qr-modal">
    <img id="qr-modal-img" src="" alt="QR Code">
    <button onclick="document.getElementById('qr-modal').style.display='none'" style="font-size: 1.2rem; padding: 10px 30px;" data-i18n="btn_close">閉じる</button>
</div>

<div class="container">
    
    <div id="tab-play" class="tab-content active">
        <div class="section" id="setup-section">
            <h2 data-i18n="start_session">練習の開始</h2>
            <div class="controls">
                <select id="session-group-select" style="min-width: 150px;"></select>
                <label><span data-i18n="courts">コート数:</span> <input type="number" id="court-count" value="3" min="1" max="10" style="width: 50px;"></label>
                <button onclick="app.initSession()" data-i18n="btn_attendance">出席を取る</button>
            </div>
        </div>

        <div class="section" id="attendance-section" style="display:none;">
            <h2>
                <span><span data-i18n="attendance_mgmt">出欠・集金管理</span> (<span id="current-session-group-name" translate="no" class="notranslate"></span>)</span>
                <button id="qr-link-btn" class="btn-pay" style="display:none; font-size: 0.8rem;" onclick="app.showQR()" data-i18n="btn_show_qr">📱 支払いQRを表示</button>
            </h2>
            <div style="margin-bottom: 15px; background: #ecf0f1; padding: 10px; border-radius: 5px;">
                <label style="font-size: 0.9rem;"><b data-i18n="filter_club">クラブ絞り込み:</b> 
                    <select id="attendance-filter-club" onchange="app.renderAttendance()"></select>
                </label>
            </div>
            <div id="member-ui"></div>
            
            <div style="margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; background: #f9f9f9; padding: 15px; border-radius: 5px;">
                <div style="margin-bottom: 10px; font-weight: bold; color: #2c3e50;">⚙️ <span data-i18n="match_settings">組み合わせ設定</span></div>
                <label style="display: block; margin-bottom: 10px;">
                    <span data-i18n="mode_select">モード選択:</span> 
                    <select id="match-mode-select" style="width: 100%; max-width: 350px; padding: 10px;">
                        <option value="even_power" data-i18n="mode_even">実力均等 (男女区別なし・全体を分散)</option>
                        <option value="level_power" data-i18n="mode_level_power">レベル別 (男女区別なし・強い人同士)</option>
                        <option value="level_mixed" data-i18n="mode_level_mixed">レベル別 (ミックス考慮・強い人同士)</option>
                    </select>
                </label>
                <button onclick="app.generateMatches()" style="font-size: 1.1rem; font-weight: bold; width: 100%; padding: 12px;" data-i18n="btn_generate">次の組み合わせを生成</button>
            </div>
        </div>

        <div class="section" id="match-section" style="display:none;">
            <h2><span data-i18n="current_games">進行中のゲーム</span> (Game <span id="game-number">1</span>)</h2>
            <div id="courts-ui"></div>
            <div style="text-align: right; margin-top: 20px;">
                <button class="btn-danger" onclick="app.endSession()" data-i18n="btn_end_session">練習を終了して記録を保存</button>
            </div>
        </div>
    </div>

    <div id="tab-members" class="tab-content">
        <div class="section">
            <h2 id="form-title" data-i18n="reg_member">新規メンバー登録</h2>
            <div class="controls">
                <input type="text" id="new-name" placeholder="Name" style="width: 120px;" translate="no">
                <select id="new-gender">
                    <option value="M" data-i18n="male">男性</option>
                    <option value="F" data-i18n="female">女性</option>
                </select>
                <select id="new-rank">
                    <option value="A">Rank A</option><option value="B">Rank B</option>
                    <option value="C" selected>Rank C</option><option value="D">Rank D</option>
                </select>
                <select id="new-club-select" style="max-width: 150px;"></select>
            </div>
            <button id="submit-member-btn" onclick="app.submitMember()" style="margin-top: 10px;" data-i18n="btn_add_member">メンバーを追加</button>
            <button id="cancel-edit-btn" onclick="app.resetForm()" style="margin-top: 10px; display: none; background:#95a5a6;" data-i18n="btn_cancel">キャンセル</button>
        </div>
        <div class="section">
            <h2 data-i18n="member_list">登録メンバー一覧</h2>
            <div id="member-database-ui" style="max-height: 400px; overflow-y: auto;"></div>
        </div>
    </div>

    <div id="tab-groups" class="tab-content">
        <div class="section">
            <h2 data-i18n="club_mgmt">所属クラブ管理 (メンバーの属性)</h2>
            <div class="controls">
                <input type="text" id="new-club-name" placeholder="Club Name" style="width: 150px;" translate="no">
                <button onclick="app.addClub()" data-i18n="btn_add_club">クラブを追加</button>
            </div>
            <div id="club-list-ui" style="margin-top: 10px;"></div>
        </div>

        <div class="section" style="border-top: 2px solid #3498db; padding-top: 20px;">
            <h2 id="group-form-title" data-i18n="add_group">開催する練習会の管理 (開催場所・決済)</h2>
            <div class="controls" style="flex-direction: column; align-items: flex-start;">
                <div><input type="text" id="new-group-name" placeholder="Session Name" style="width: 250px;" translate="no"></div>
                <div style="font-size: 0.9rem; color: #555; margin-top: 5px;" data-i18n="qr_upload">決済用QRコード画像 (任意):</div>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <input type="file" id="new-group-qr" accept="image/*" style="font-size: 0.9rem;">
                    <img id="qr-preview" src="" style="display:none; height: 50px; border: 1px solid #ccc;">
                </div>
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <button id="submit-group-btn" onclick="app.submitGroup()" data-i18n="btn_add_group">練習会を追加</button>
                    <button id="cancel-group-edit-btn" onclick="app.resetGroupForm()" style="display: none; background:#95a5a6;" data-i18n="btn_cancel">キャンセル</button>
                </div>
            </div>
            <div id="group-list-ui" style="margin-top: 15px;"></div>
        </div>
    </div>

    <div id="tab-history" class="tab-content">
        <div class="section">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2 data-i18n="history_title" style="border:none; margin:0; padding:0;">練習会履歴</h2>
                <div>
                    <label style="font-size: 0.9rem; margin-right: 5px;" data-i18n="filter_member">メンバー検索:</label>
                    <select id="history-member-filter" onchange="app.renderHistory()" style="padding: 5px;"></select>
                </div>
            </div>
            <div id="history-ui" style="margin-top: 15px;"></div>
        </div>
    </div>

</div>

        btn_edit: "編集", btn_delete: "削除", court: "コート", register_score: "結果登録", registered: "✓ スコア保存済",
        edit_players: "✍️ メンバー変更", save_players: "💾 変更を確定", all_clubs: "すべて表示", all_members: "全員を表示",
        synergy_ranking: "相性ランキング (シナジー効果)", best_partners: "相性の良いペア (上位5)", worst_partners: "シナジーが発揮しにくいペア (下位5)"
    },
    en: {
        tab_play: "Play Today", tab_members: "Members", tab_groups: "Clubs/Sessions", tab_history: "History",
        start_session: "Start Session", courts: "Courts:", btn_attendance: "Take Attendance",
        attendance_mgmt: "Attendance & Payment", btn_show_qr: "📱 Show QR", filter_club: "Filter Club:",
        match_settings: "Match Settings", mode_select: "Mode:",
        mode_even: "Even Power (Dispersed)", mode_level_power: "Level-based (Ignore Gender)", mode_level_mixed: "Level-based (Prioritize Mixed)",
        btn_generate: "Generate Matches", current_games: "Current Games", btn_end_session: "End Session & Save",

        add_group: "Session Management", edit_group: "Edit Session", qr_upload: "Payment QR (Optional):",
        btn_add_group: "Add Session", history_title: "Session History", filter_member: "Search Member:", btn_close: "Close",
        status_present: "Present", status_absent: "Rest", pay_done: "Paid", pay_wait: "Unpaid",

    id: {

        attendance_mgmt: "Kehadiran & Bayar", btn_show_qr: "📱 Tampilkan QR", filter_club: "Filter Klub:",

        synergy_ranking: "Peringkat Sinergi", best_partners: "Pasangan Terbaik (Top 5)", worst_partners: "Perlu Penyesuaian (Bawah 5)"
    }
};

const app = {
    lang: 'ja',
    members: [], clubs: [], groups: [], history: [], currentSession: null,
    editingMemberId: null, editingGroupName: null, tempQrData: '',
    isEditingMatch: false,
    K_FACTOR: 32,
    rankToRating: { 'A': 1600, 'B': 1500, 'C': 1400, 'D': 1300 },
    ratingToRank: { 1600: 'A', 1500: 'B', 1400: 'C', 1300: 'D' },

    t(key) {
        if(dict[this.lang] && dict[this.lang][key]) return dict[this.lang][key];
        if(dict['en'] && dict['en'][key]) return dict['en'][key];
        return key; 
    },

    changeLang(newLang) {
        this.lang = newLang; localStorage.setItem('bm_lang', newLang);
        document.documentElement.lang = newLang;
        document.querySelectorAll('[data-i18n]').forEach(el => { el.innerText = this.t(el.getAttribute('data-i18n')); });
        if (this.members.length > 0 || this.groups.length > 0) {
            this.renderAll();
            if(this.currentSession) { this.renderAttendance(); this.renderMatches(); }
        }
    },

    getRank(rating) {
        if (rating >= 1550) return 'A'; if (rating >= 1450) return 'B';
        if (rating >= 1350) return 'C'; return 'D';
    },

    init() {
        const savedMembers = localStorage.getItem('bm_members_v4');
        const savedClubs = localStorage.getItem('bm_clubs_v4');
        const savedGroups = localStorage.getItem('bm_groups_v4');
        const savedHistory = localStorage.getItem('bm_history_v4');
        
        if (savedMembers) this.members = JSON.parse(savedMembers);
        if (savedClubs) this.clubs = JSON.parse(savedClubs);
        if (savedGroups) this.groups = JSON.parse(savedGroups);
        if (savedHistory) this.history = JSON.parse(savedHistory);

        this.members.forEach(m => { 
            if (!m.rating) m.rating = 1400; 
            if (!m.club) m.club = ''; 
            if (!m.synergies) m.synergies = {}; 
        });

        document.getElementById('new-group-qr').addEventListener('change', (e) => {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height;

                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    app.tempQrData = canvas.toDataURL('image/jpeg', 0.8);
                    document.getElementById('qr-preview').src = app.tempQrData; document.getElementById('qr-preview').style.display = 'block';
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        });
        
        const savedLang = localStorage.getItem('bm_lang');
        if (savedLang) { this.lang = savedLang; document.getElementById('lang-select').value = savedLang; }

    getBestPairing(players, mode) {
        const patterns = [
            { t1: [0, 1], t2: [2, 3] }, { t1: [0, 2], t2: [1, 3] }, { t1: [0, 3], t2: [1, 2] }
        ];
        let bestPattern = patterns[0];
        let bestScore = -Infinity;

        const getS = (pA, pB) => (pA.synergies && pA.synergies[pB.id]) ? pA.synergies[pB.id] : 0;

        patterns.forEach(p => {
            const p1 = players[p.t1[0]], p2 = players[p.t1[1]];
            const p3 = players[p.t2[0]], p4 = players[p.t2[1]];
            
            const rT1 = (p1.rating + p2.rating) / 2 + getS(p1, p2);
            const rT2 = (p3.rating + p4.rating) / 2 + getS(p3, p4);
            const diff = Math.abs(rT1 - rT2);
            
            let score = -diff; 
            if (mode === 'level_mixed') {
                let mixedCount = 0;
                if (p1.gender !== p2.gender) mixedCount++;
                if (p3.gender !== p4.gender) mixedCount++;
                score += mixedCount * 1000; 
            }
            if (score > bestScore) { bestScore = score; bestPattern = p; }
        });

        return [ players[bestPattern.t1[0]], players[bestPattern.t1[1]], players[bestPattern.t2[0]], players[bestPattern.t2[1]] ];
    },

    generateMatches() {
        if(!this.currentSession) return;
        const activeMembers = this.members.filter(m => m.active);
        const needed = this.currentSession.courts * 4;
        if (activeMembers.length < needed) return alert('Not enough players');

        let selected = [...activeMembers].sort((a, b) => a.playCount - b.playCount).slice(0, needed);
        selected.forEach(p => { const m = this.members.find(x => x.id === p.id); if(m) m.playCount++; });
        selected.sort((a, b) => b.rating - a.rating);

        const mode = document.getElementById('match-mode-select').value;
        let currentMatchRecord = { game: this.currentSession.gameCount, courts: [] };
        let courtPlayersList = [];

        if (mode === 'even_power') {
            courtPlayersList = Array.from({length: this.currentSession.courts}, () => []);
            for (let i = 0; i < selected.length; i++) {
                let cycle = Math.floor(i / this.currentSession.courts);
                let rem = i % this.currentSession.courts;
                let courtIdx = (cycle % 2 === 0) ? rem : (this.currentSession.courts - 1 - rem);
                courtPlayersList[courtIdx].push(selected[i]);
            }
        } else {
            for (let i = 0; i < this.currentSession.courts; i++) {
                courtPlayersList.push([ selected[i * 4], selected[i * 4 + 1], selected[i * 4 + 2], selected[i * 4 + 3] ]);
            }
        }

        for (let i = 0; i < this.currentSession.courts; i++) {
            let players = this.getBestPairing(courtPlayersList[i], mode);
            currentMatchRecord.courts.push({ 
                team1: [players[0].id, players[1].id], 
                team2: [players[2].id, players[3].id], 
                names: players.map(p => p.name),
                score1: null, score2: null, isRegistered: false 
            });
        }

        this.currentSession.matches.push(currentMatchRecord);
        this.isEditingMatch = false; 
        this.renderAttendance();
        this.renderMatches();
        document.getElementById('game-number').innerText = ++this.currentSession.gameCount;
    },

    toggleEditMatch() {
        this.isEditingMatch = !this.isEditingMatch;
        this.renderMatches();
    },

    changePlayer(courtIdx, teamIdx, posIdx, newPlayerIdStr) {
        const newId = parseInt(newPlayerIdStr);
        const matchRecord = this.currentSession.matches[this.currentSession.matches.length - 1];
        const newPlayer = this.members.find(m => m.id === newId);
        if(!newPlayer) return;
        const teamKey = teamIdx === 1 ? 'team1' : 'team2';
        matchRecord.courts[courtIdx][teamKey][posIdx] = newId;
        const flatIndex = (teamIdx === 1) ? posIdx : (2 + posIdx);
        matchRecord.courts[courtIdx].names[flatIndex] = newPlayer.name;
    },

    renderMatches() {

                } else {

                }
            };

            ui.innerHTML += `
                <div class="court-card" id="court-card-${i}">

                    <h3 style="margin-top:0;">${this.t('court')} ${i + 1}</h3>
                    <div class="team-box"><b>Team 1:</b> ${playerHtml(p[0], 1, 0)} & ${playerHtml(p[1], 1, 1)}</div>
                    <div style="text-align:center; font-size:0.8rem; color:#888;">VS</div>
                    <div class="team-box"><b>Team 2:</b> ${playerHtml(p[2], 2, 0)} & ${playerHtml(p[3], 2, 1)}</div>
                    
                    ${!this.isEditingMatch ? `
                    <div class="score-input-area" id="score-area-${i}">
                        ${c.isRegistered ? `<span style="color:#2ecc71; font-weight:bold;">${this.t('registered')} (${c.score1} - ${c.score2})</span>` : `
                        <input type="number" id="score_t1_${i}" placeholder="T1" style="width: 50px;"> - 
                        <input type="number" id="score_t2_${i}" placeholder="T2" style="width: 50px;">
                        <button class="btn-success" onclick="app.registerScore(${i})">${this.t('register_score')}</button>
                        `}
                    </div>` : ''}
                </div>
            `;
        });
    },

    registerScore(courtIndex) {
        const score1 = parseInt(document.getElementById(`score_t1_${courtIndex}`).value);
        const score2 = parseInt(document.getElementById(`score_t2_${courtIndex}`).value);
        if (isNaN(score1) || isNaN(score2)) return;

        const matchRecord = this.currentSession.matches[this.currentSession.matches.length - 1];
        const courtData = matchRecord.courts[courtIndex];
        
        courtData.score1 = score1; courtData.score2 = score2; courtData.isRegistered = true;

        const t1_p1 = this.members.find(m => m.id === courtData.team1[0]); const t1_p2 = this.members.find(m => m.id === courtData.team1[1]);
        const t2_p1 = this.members.find(m => m.id === courtData.team2[0]); const t2_p2 = this.members.find(m => m.id === courtData.team2[1]);
        if(!t1_p1 || !t1_p2 || !t2_p1 || !t2_p2) return;

        const getS = (pA, pB) => (pA.synergies && pA.synergies[pB.id]) ? pA.synergies[pB.id] : 0;

        const r1 = (t1_p1.rating + t1_p2.rating) / 2 + getS(t1_p1, t1_p2); 
        const r2 = (t2_p1.rating + t2_p2.rating) / 2 + getS(t2_p1, t2_p2);
        
        const expected1 = 1 / (1 + Math.pow(10, (r2 - r1) / 400)); 
        const expected2 = 1 / (1 + Math.pow(10, (r1 - r2) / 400));
        
        let actual1, actual2;
        const pointDiff = Math.abs(score1 - score2);
        const marginMultiplier = Math.log(pointDiff + 1) * 0.5 + 0.5; 

        if (score1 > score2) { actual1 = 1; actual2 = 0; } 
        else if (score1 < score2) { actual1 = 0; actual2 = 1; } 
        else { actual1 = 0.5; actual2 = 0.5; }

        const delta1 = this.K_FACTOR * marginMultiplier * (actual1 - expected1);
        const delta2 = this.K_FACTOR * marginMultiplier * (actual2 - expected2);

        t1_p1.rating += delta1 * 0.5; t1_p2.rating += delta1 * 0.5;
        t2_p1.rating += delta2 * 0.5; t2_p2.rating += delta2 * 0.5;

        t1_p1.synergies[t1_p2.id] = getS(t1_p1, t1_p2) + delta1 * 0.5;
        t1_p2.synergies[t1_p1.id] = getS(t1_p2, t1_p1) + delta1 * 0.5;
        t2_p1.synergies[t2_p2.id] = getS(t2_p1, t2_p2) + delta2 * 0.5;
        t2_p2.synergies[t2_p1.id] = getS(t2_p2, t2_p1) + delta2 * 0.5;

        this.saveData(); this.renderMatches(); 
    },

    endSession() {
        if(confirm('End Session?')) {
            if(this.currentSession && this.currentSession.matches.length > 0) {
                this.history.unshift(this.currentSession);
                this.saveData(); this.renderHistory();
            }
            document.getElementById('setup-section').style.display = 'block';
            document.getElementById('attendance-section').style.display = 'none';
            document.getElementById('match-section').style.display = 'none';
            this.currentSession = null;
            this.switchTab('tab-history');
        }
    },

    renderHistory() {
        const ui = document.getElementById('history-ui');
        const filterId = document.getElementById('history-member-filter').value;
        
        let rankingHtml = '';
        let filteredHistory = [];

        if (!filterId) {
            filteredHistory = this.history;
        } else {
            const memberId = parseInt(filterId);
            
            this.history.forEach(session => {
                let sessionCopy = { ...session, matches: [] };
                session.matches.forEach(game => {
                    let gameCopy = { ...game, courts: [] };
                    game.courts.forEach(court => {
                        if (court.team1.includes(memberId) || court.team2.includes(memberId)) {
                            gameCopy.courts.push(court);
                        }
                    });
                    if (gameCopy.courts.length > 0) sessionCopy.matches.push(gameCopy);
                });
                if (sessionCopy.matches.length > 0) filteredHistory.push(sessionCopy);
            });

            const m = this.members.find(x => x.id === memberId);
            if (m && m.synergies) {
                const partners = Object.keys(m.synergies).map(pid => {
                    const partner = this.members.find(x => x.id == pid);
                    return { name: partner ? partner.name : 'Unknown', val: m.synergies[pid] };
                }).filter(p => p.name !== 'Unknown').sort((a, b) => b.val - a.val);
                
                const top5 = partners.filter(p => p.val > 0).slice(0, 5);
                const bottom5 = partners.filter(p => p.val < 0).reverse().slice(0, 5); 
                
                if (top5.length > 0 || bottom5.length > 0) {
                    rankingHtml = `
                        <div class="synergy-box">
                            <h4 style="margin-top:0; color:#2c3e50;">📊 ${this.t('synergy_ranking')}</h4>
                            <div style="display:flex; gap:20px; flex-wrap:wrap;">
                                <div style="flex:1; min-width:200px;">
                                    <div style="color:#27ae60; font-weight:bold;">👍 ${this.t('best_partners')}</div>
                                    <ol style="margin:5px 0; padding-left:20px; font-size:0.9rem;">
                                        ${top5.map(p => `<li><span translate="no" class="notranslate">${p.name}</span> (+${p.val.toFixed(1)})</li>`).join('') || `<li>-</li>`}
                                    </ol>
                                </div>
                                <div style="flex:1; min-width:200px;">
                                    <div style="color:#e74c3c; font-weight:bold;">📉 ${this.t('worst_partners')}</div>
                                    <ol style="margin:5px 0; padding-left:20px; font-size:0.9rem;">
                                        ${bottom5.map(p => `<li><span translate="no" class="notranslate">${p.name}</span> (${p.val.toFixed(1)})</li>`).join('') || `<li>-</li>`}
                                    </ol>
                                </div>
                            </div>
                        </div>
                    `;
                }
            }
        }

        const historyListHtml = filteredHistory.map(h => `
            <div class="history-card">
                <div class="history-date"><span translate="no" class="notranslate">${h.date} ${h.time} (${h.group})</span></div>
                ${h.matches.map(m => `
                    <div class="history-game">
                        <div style="font-weight:bold; margin-bottom:5px;">Game ${m.game}</div>
                        ${m.courts.map((c, i) => `
                            <div class="history-match">
                                <span translate="no" class="notranslate">[C${i+1}] ${c.names[0]} & ${c.names[1]} VS ${c.names[2]} & ${c.names[3]}</span>
                                ${c.isRegistered ? `<span class="score-box">${c.score1} - ${c.score2}</span>` : `<span style="color:#aaa; font-size:0.8rem;">-</span>`}
                            </div>
                        `).join('')}
                    </div>
                `).join('')}
            </div>
        `).join('') || `<p style="color:#777;">${this.t('no_history')}</p>`;

        ui.innerHTML = rankingHtml + historyListHtml;
    }
};

window.onload = () => app.init();
</script>
</body>
</html>
