<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badminton Match Maker Pro v3</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background-color: #f4f7f6; color: #333; }
        .header { background-color: #2c3e50; color: white; padding: 15px 20px; text-align: center; font-size: 1.2rem; font-weight: bold; }
        .tab-menu { display: flex; background-color: #34495e; overflow-x: auto; }
        .tab-btn { flex: 1; min-width: 100px; padding: 12px 0; background: none; border: none; color: white; cursor: pointer; font-size: 1rem; }
        .tab-btn.active { background-color: #3498db; font-weight: bold; }
        .container { max-width: 800px; margin: 20px auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        h2 { color: #2c3e50; font-size: 1.1rem; border-bottom: 2px solid #3498db; padding-bottom: 5px; margin-top: 0; }
        .section { margin-bottom: 20px; padding: 15px; background: #fdfdfd; border: 1px solid #eee; border-radius: 5px; }
        button { background-color: #3498db; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 14px; margin: 5px 0; }
        button:hover { background-color: #2980b9; }
        .btn-danger { background-color: #e74c3c; }
        .controls { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 10px; }
        input[type="text"], input[type="number"], select { padding: 8px; border-radius: 4px; border: 1px solid #ccc; font-size: 14px; }
        .toggle-btn { margin: 5px; padding: 10px; border-radius: 5px; border: 1px solid #ccc; cursor: pointer; display: inline-block; width: calc(50% - 25px); text-align: center; }
        .toggle-btn.active { background-color: #2ecc71; color: white; border-color: #27ae60; }
        .court-card { border: 2px solid #3498db; padding: 10px; border-radius: 8px; margin-bottom: 15px; background-color: #f8fbfd; }
        .player-slot { background: white; padding: 5px; margin: 3px 0; border-radius: 3px; border: 1px dashed #ccc; font-size: 0.9rem;}
        .history-card { border: 1px solid #ddd; padding: 10px; border-radius: 5px; margin-bottom: 10px; }
        .history-date { font-weight: bold; color: #3498db; margin-bottom: 5px; }
        .checkbox-group { display: flex; flex-wrap: wrap; gap: 10px; background: #fff; padding: 10px; border: 1px solid #ccc; border-radius: 4px; max-height: 100px; overflow-y: auto;}
    </style>
</head>
<body>

<div class="header">🏸 Badminton Match Maker Pro v3</div>
<div class="tab-menu">
    <button class="tab-btn active" onclick="app.switchTab('tab-play')">今日の練習</button>
    <button class="tab-btn" onclick="app.switchTab('tab-members')">名簿管理</button>
    <button class="tab-btn" onclick="app.switchTab('tab-groups')">練習会管理</button>
    <button class="tab-btn" onclick="app.switchTab('tab-history')">過去の履歴</button>
</div>

<div class="container">
    
    <div id="tab-play" class="tab-content active">
        <div class="section" id="setup-section">
            <h2>練習の開始</h2>
            <div class="controls">
                <select id="session-group-select">
                    </select>
                <label>コート数: <input type="number" id="court-count" value="3" min="1" max="10" style="width: 50px;"></label>
                <button onclick="app.initSession()">出席を取る</button>
            </div>
        </div>

        <div class="section" id="attendance-section" style="display:none;">
            <h2>出欠・待機管理 (<span id="current-session-group-name"></span>)</h2>
            <div id="member-ui"></div>
            <div style="margin-top: 15px; border-top: 1px solid #eee; padding-top: 15px;">
                <button onclick="app.generateMatches()" style="font-size: 1.1rem; font-weight: bold; width: 100%;">次の組み合わせを生成</button>
            </div>
        </div>

        <div class="section" id="match-section" style="display:none;">
            <h2>進行中のゲーム (Game <span id="game-number">1</span>)</h2>
            <div id="courts-ui"></div>
            <div style="text-align: right; margin-top: 20px;">
                <button class="btn-danger" onclick="app.endSession()">練習を終了して記録を保存</button>
            </div>
        </div>
    </div>

    <div id="tab-members" class="tab-content">
        <div class="section">
            <h2>新規メンバー登録</h2>
            <div class="controls">
                <input type="text" id="new-name" placeholder="名前" style="width: 120px;">
                <select id="new-gender"><option value="M">男性</option><option value="F">女性</option></select>
                <select id="new-rank">
                    <option value="A">ランクA</option><option value="B">ランクB</option>
                    <option value="C" selected>ランクC</option><option value="D">ランクD</option>
                </select>
            </div>
            <div style="margin-bottom: 5px; font-size: 0.9rem;">所属する練習会を選択:</div>
            <div class="checkbox-group" id="new-member-groups">
                </div>
            <button onclick="app.addMember()" style="margin-top: 10px;">メンバーを追加</button>
        </div>
        <div class="section">
            <h2>登録メンバー一覧（グローバルデータ）</h2>
            <div id="member-database-ui" style="max-height: 400px; overflow-y: auto;"></div>
        </div>
    </div>

    <div id="tab-groups" class="tab-content">
        <div class="section">
            <h2>新しい練習会の追加</h2>
            <div class="controls">
                <input type="text" id="new-group-name" placeholder="例: ミナクサ会" style="width: 200px;">
                <button onclick="app.addGroup()">練習会を追加</button>
            </div>
        </div>
        <div class="section">
            <h2>登録済みの練習会</h2>
            <div id="group-list-ui"></div>
        </div>
    </div>

    <div id="tab-history" class="tab-content">
        <div class="section">
            <h2>練習会履歴</h2>
            <div id="history-ui"></div>
        </div>
    </div>

</div>

<script>
const app = {
    members: [],
    groups: [],
    history: [],
    currentSession: null,
    rankToRating: { 'A': 1600, 'B': 1500, 'C': 1400, 'D': 1300 },

    getRank(rating) {
        if (rating >= 1550) return 'A';
        if (rating >= 1450) return 'B';
        if (rating >= 1350) return 'C';
        return 'D';
    },

    init() {
        const savedMembers = localStorage.getItem('bm_members_v3');
        const savedGroups = localStorage.getItem('bm_groups_v3');
        const savedHistory = localStorage.getItem('bm_history_v3');
        
        if (savedMembers) this.members = JSON.parse(savedMembers);
        if (savedGroups) this.groups = JSON.parse(savedGroups);
        if (savedHistory) this.history = JSON.parse(savedHistory);

        // v2からの移行用フェイルセーフ
        this.members.forEach(m => {
            if (!m.groups) {
                m.groups = m.group ? [m.group] : [];
            }
        });
        
        this.renderAll();
    },

    saveData() {
        localStorage.setItem('bm_members_v3', JSON.stringify(this.members));
        localStorage.setItem('bm_groups_v3', JSON.stringify(this.groups));
        localStorage.setItem('bm_history_v3', JSON.stringify(this.history));
    },

    renderAll() {
        this.renderGroups();
        this.renderDatabase();
        this.renderHistory();
        this.updateGroupSelects();
    },

    switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    },

    // --- グループ管理ロジック ---
    addGroup() {
        const name = document.getElementById('new-group-name').value.trim();
        if (!name) return alert('練習会名を入力してください');
        if (this.groups.includes(name)) return alert('その練習会は既に存在します');
        
        this.groups.push(name);
        document.getElementById('new-group-name').value = '';
        this.saveData();
        this.renderAll();
    },

    deleteGroup(groupName) {
        if(confirm(`「${groupName}」を削除しますか？\n※メンバーの所属情報からも解除されます。`)) {
            this.groups = this.groups.filter(g => g !== groupName);
            // メンバーの所属情報からも該当グループを削除
            this.members.forEach(m => {
                m.groups = m.groups.filter(g => g !== groupName);
            });
            this.saveData();
            this.renderAll();
        }
    },

    renderGroups() {
        const ui = document.getElementById('group-list-ui');
        ui.innerHTML = this.groups.map(g => `
            <div style="border-bottom: 1px solid #eee; padding: 8px 0; display: flex; justify-content: space-between; align-items: center;">
                <span><b>${g}</b></span>
                <button class="btn-danger" style="padding: 4px 8px; font-size: 0.8rem;" onclick="app.deleteGroup('${g}')">削除</button>
            </div>
        `).join('') || '<p style="color:#777;">練習会が登録されていません。</p>';
    },

    updateGroupSelects() {
        // 練習開始用セレクトボックス
        const playSelect = document.getElementById('session-group-select');
        playSelect.innerHTML = this.groups.length > 0 ? '' : '<option value="">練習会を登録してください</option>';
        this.groups.forEach(g => {
            playSelect.innerHTML += `<option value="${g}">${g}</option>`;
        });

        // メンバー登録用チェックボックス
        const memberGroupsUi = document.getElementById('new-member-groups');
        memberGroupsUi.innerHTML = this.groups.map(g => `
            <label><input type="checkbox" value="${g}" class="new-member-group-chk"> ${g}</label>
        `).join('') || '<span style="color:#777; font-size:0.9rem;">先に「練習会管理」タブで練習会を作成してください。</span>';
    },

    // --- メンバー管理ロジック ---
    addMember() {
        const name = document.getElementById('new-name').value.trim();
        const gender = document.getElementById('new-gender').value;
        const rank = document.getElementById('new-rank').value;
        
        const checkedGroups = Array.from(document.querySelectorAll('.new-member-group-chk:checked')).map(cb => cb.value);

        if (!name) return alert('名前を入力してください');

        this.members.push({
            id: Date.now(), name, gender, groups: checkedGroups,
            rating: this.rankToRating[rank],
            active: false, playCount: 0
        });

        document.getElementById('new-name').value = '';
        document.querySelectorAll('.new-member-group-chk').forEach(cb => cb.checked = false);
        this.saveData();
        this.renderDatabase();
    },

    deleteMember(id) {
        if(confirm('完全に削除しますか？（過去の履歴には名前が残りますが、データは消去されます）')) {
            this.members = this.members.filter(m => m.id !== id);
            this.saveData();
            this.renderDatabase();
        }
    },

    renderDatabase() {
        const ui = document.getElementById('member-database-ui');
        ui.innerHTML = this.members.map(m => `
            <div style="border-bottom: 1px solid #eee; padding: 8px 0; display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <b>${m.name}</b> (${m.
