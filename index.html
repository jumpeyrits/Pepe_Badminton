<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badminton Match Maker Pro v3.9</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background-color: #f4f7f6; color: #333; }
        .header { background-color: #2c3e50; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .header-title { font-size: 1.2rem; font-weight: bold; }
        .lang-select { padding: 5px; border-radius: 4px; border: none; font-size: 0.9rem; background: #34495e; color: white; cursor: pointer; }
        .tab-menu { display: flex; background-color: #34495e; overflow-x: auto; }
        .tab-btn { flex: 1; min-width: 100px; padding: 12px 0; background: none; border: none; color: white; cursor: pointer; font-size: 1rem; }
        .tab-btn.active { background-color: #3498db; font-weight: bold; }
        .container { max-width: 800px; margin: 20px auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        h2 { color: #2c3e50; font-size: 1.1rem; border-bottom: 2px solid #3498db; padding-bottom: 5px; margin-top: 0; display: flex; justify-content: space-between; align-items: center; }
        .section { margin-bottom: 20px; padding: 15px; background: #fdfdfd; border: 1px solid #eee; border-radius: 5px; }
        button { background-color: #3498db; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 14px; margin: 5px 0; }
        button:hover { background-color: #2980b9; }
        .btn-danger { background-color: #e74c3c; }
        .btn-danger:hover { background-color: #c0392b; }
        .btn-edit { background-color: #f39c12; }
        .btn-pay { background-color: #ff0033; font-weight: bold; }
        .btn-success { background-color: #2ecc71; }
        .controls { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 10px; }
        input[type="text"], input[type="number"], select { padding: 8px; border-radius: 4px; border: 1px solid #ccc; font-size: 14px; }
        
        .member-card { border: 1px solid #ddd; border-radius: 5px; padding: 10px; margin: 5px; display: inline-block; width: calc(50% - 35px); vertical-align: top; background: #fff; }
        .status-btn { width: 100%; padding: 8px 0; border-radius: 4px; border: none; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .status-active { background-color: #2ecc71; color: white; }
        .status-inactive { background-color: #ecf0f1; color: #7f8c8d; }
        .pay-done { background-color: #f1c40f; color: white; }
        .pay-wait { background-color: #ecf0f1; color: #7f8c8d; border: 1px dashed #bdc3c7; }

        .court-card { border: 2px solid #3498db; padding: 10px; border-radius: 8px; margin-bottom: 15px; background-color: #f8fbfd; position: relative; }
        .team-box { background: white; padding: 5px; border-radius: 3px; border: 1px dashed #ccc; margin-bottom: 5px;}
        .score-input-area { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px; padding-top: 10px; border-top: 1px dotted #ccc; }
        .edit-match-btn { position: absolute; top: 10px; right: 10px; background: #95a5a6; padding: 4px 8px; font-size: 0.8rem; }
        
        .history-card { border: 1px solid #ddd; padding: 10px; border-radius: 5px; margin-bottom: 10px; }
        .history-date { font-weight: bold; color: #3498db; margin-bottom: 5px; }
        
        #qr-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; }
        #qr-modal img { max-width: 80%; max-height: 60vh; background: white; padding: 10px; border-radius: 10px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-title">🏸 Badminton Match Maker Pro</div>
    <select id="lang-select" class="lang-select" onchange="app.changeLang(this.value)">
        <option value="ja">🇯🇵 日本語</option>
        <option value="en">🇺🇸 English</option>
        <option value="id">🇮🇩 Bahasa Indonesia</option>
        <option value="ms">🇲🇾 Bahasa Melayu</option>
        <option value="zh">🇨🇳 中文</option>
    </select>
</div>
<div class="tab-menu">
    <button class="tab-btn active" onclick="app.switchTab('tab-play')" data-i18n="tab_play">今日の練習</button>
    <button class="tab-btn" onclick="app.switchTab('tab-members')" data-i18n="tab_members">名簿管理</button>
    <button class="tab-btn" onclick="app.switchTab('tab-groups')" data-i18n="tab_groups">クラブ・練習会管理</button>
    <button class="tab-btn" onclick="app.switchTab('tab-history')" data-i18n="tab_history">過去の履歴</button>
</div>

<div id="qr-modal">
    <img id="qr-modal-img" src="" alt="QR Code">
    <button onclick="document.getElementById('qr-modal').style.display='none'" style="font-size: 1.2rem; padding: 10px 30px;" data-i18n="btn_close">閉じる</button>
</div>

<div class="container">
    
    <div id="tab-play" class="tab-content active">
        <div class="section" id="setup-section">
            <h2 data-i18n="start_session">練習の開始</h2>
            <div class="controls">
                <select id="session-group-select" style="min-width: 150px;"></select>
                <label><span data-i18n="courts">コート数:</span> <input type="number" id="court-count" value="3" min="1" max="10" style="width: 50px;"></label>
                <button onclick="app.initSession()" data-i18n="btn_attendance">出席を取る</button>
            </div>
        </div>

        <div class="section" id="attendance-section" style="display:none;">
            <h2>
                <span><span data-i18n="attendance_mgmt">出欠・集金管理</span> (<span id="current-session-group-name"></span>)</span>
                <button id="qr-link-btn" class="btn-pay" style="display:none; font-size: 0.8rem;" onclick="app.showQR()" data-i18n="btn_show_qr">📱 支払いQRを表示</button>
            </h2>
            <div style="margin-bottom: 15px; background: #ecf0f1; padding: 10px; border-radius: 5px;">
                <label style="font-size: 0.9rem;"><b data-i18n="filter_club">クラブ絞り込み:</b> 
                    <select id="attendance-filter-club" onchange="app.renderAttendance()"></select>
                </label>
            </div>
            <div id="member-ui"></div>
            
            <div style="margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; background: #f9f9f9; padding: 15px; border-radius: 5px;">
                <div style="margin-bottom: 10px; font-weight: bold; color: #2c3e50;">⚙️ <span data-i18n="match_settings">組み合わせ設定</span></div>
                <label style="display: block; margin-bottom: 10px;">
                    <span data-i18n="mode_select">モード選択:</span> 
                    <select id="match-mode-select" style="width: 100%; max-width: 350px; padding: 10px;">
                        <option value="even_power" data-i18n="mode_even">実力均等 (男女区別なし・全体を分散)</option>
                        <option value="level_power" data-i18n="mode_level_power">レベル別 (男女区別なし・強い人同士)</option>
                        <option value="level_mixed" data-i18n="mode_level_mixed">レベル別 (ミックス考慮・強い人同士)</option>
                    </select>
                </label>
                <button onclick="app.generateMatches()" style="font-size: 1.1rem; font-weight: bold; width: 100%; padding: 12px;" data-i18n="btn_generate">次の組み合わせを生成</button>
            </div>
        </div>

        <div class="section" id="match-section" style="display:none;">
            <h2><span data-i18n="current_games">進行中のゲーム</span> (Game <span id="game-number">1</span>)</h2>
            <div id="courts-ui"></div>
            <div style="text-align: right; margin-top: 20px;">
                <button class="btn-danger" onclick="app.endSession()" data-i18n="btn_end_session">練習を終了して記録を保存</button>
            </div>
        </div>
    </div>

    <div id="tab-members" class="tab-content">
        <div class="section">
            <h2 id="form-title" data-i18n="reg_member">新規メンバー登録</h2>
            <div class="controls">
                <input type="text" id="new-name" placeholder="Name" style="width: 120px;">
                <select id="new-gender">
                    <option value="M" data-i18n="male">男性</option>
                    <option value="F" data-i18n="female">女性</option>
                </select>
                <select id="new-rank">
                    <option value="A">Rank A</option><option value="B">Rank B</option>
                    <option value="C" selected>Rank C</option><option value="D">Rank D</option>
                </select>
                <select id="new-club-select" style="max-width: 150px;"></select>
            </div>
            <button id="submit-member-btn" onclick="app.submitMember()" style="margin-top: 10px;" data-i18n="btn_add_member">メンバーを追加</button>
            <button id="cancel-edit-btn" onclick="app.resetForm()" style="margin-top: 10px; display: none; background:#95a5a6;" data-i18n="btn_cancel">キャンセル</button>
        </div>
        <div class="section">
            <h2 data-i18n="member_list">登録メンバー一覧</h2>
            <div id="member-database-ui" style="max-height: 400px; overflow-y: auto;"></div>
        </div>
    </div>

    <div id="tab-groups" class="tab-content">
        <div class="section">
            <h2 data-i18n="club_mgmt">所属クラブ管理 (メンバーの属性)</h2>
            <div class="controls">
                <input type="text" id="new-club-name" placeholder="Club Name" style="width: 150px;">
                <button onclick="app.addClub()" data-i18n="btn_add_club">クラブを追加</button>
            </div>
            <div id="club-list-ui" style="margin-top: 10px;"></div>
        </div>

        <div class="section" style="border-top: 2px solid #3498db; padding-top: 20px;">
            <h2 id="group-form-title" data-i18n="add_group">開催する練習会の管理 (開催場所・決済)</h2>
            <div class="controls" style="flex-direction: column; align-items: flex-start;">
                <div><input type="text" id="new-group-name" placeholder="Session Name" style="width: 250px;"></div>
                <div style="font-size: 0.9rem; color: #555; margin-top: 5px;" data-i18n="qr_upload">決済用QRコード画像 (任意):</div>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <input type="file" id="new-group-qr" accept="image/*" style="font-size: 0.9rem;">
                    <img id="qr-preview" src="" style="display:none; height: 50px; border: 1px solid #ccc;">
                </div>
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <button id="submit-group-btn" onclick="app.submitGroup()" data-i18n="btn_add_group">練習会を追加</button>
                    <button id="cancel-group-edit-btn" onclick="app.resetGroupForm()" style="display: none; background:#95a5a6;" data-i18n="btn_cancel">キャンセル</button>
                </div>
            </div>
            <div id="group-list-ui" style="margin-top: 15px;"></div>
        </div>
    </div>

    <div id="tab-history" class="tab-content">
        <div class="section">
            <h2 data-i18n="history_title">練習会履歴</h2>
            <div id="history-ui"></div>
        </div>
    </div>

</div>

<script>
const dict = {
    ja: {
        tab_play: "今日の練習", tab_members: "名簿管理", tab_groups: "クラブ・練習会管理", tab_history: "過去の履歴",
        start_session: "練習の開始", courts: "コート数:", btn_attendance: "出席を取る",
        attendance_mgmt: "出欠・集金管理", btn_show_qr: "📱 支払いQRを表示", filter_club: "クラブ絞り込み:",
        match_settings: "組み合わせ設定", mode_select: "モード選択:",
        mode_even: "実力均等 (男女区別なし・全体を分散)", mode_level_power: "レベル別 (男女区別なし・強い人同士)", mode_level_mixed: "レベル別 (ミックス考慮・強い人同士)",
        btn_generate: "次の組み合わせを生成", current_games: "進行中のゲーム", btn_end_session: "練習を終了して記録を保存",
        reg_member: "新規メンバー登録", edit_member: "メンバー情報の編集", male: "男性", female: "女性", club_none: "所属なし",
        btn_add_member: "メンバーを追加", btn_update: "情報を更新する", btn_cancel: "キャンセル",
        member_list: "登録メンバー一覧", club_mgmt: "所属クラブ管理", btn_add_club: "クラブを追加",
        add_group: "開催する練習会の管理", edit_group: "練習会情報の編集", qr_upload: "決済用QRコード画像 (任意):",
        btn_add_group: "練習会を追加", history_title: "練習会履歴", btn_close: "閉じる",
        status_present: "出席", status_absent: "休み", pay_done: "集金済", pay_wait: "未納",
        play_count: "試合数", no_members: "メンバーがいません", no_groups: "データがありません",
        btn_edit: "編集", btn_delete: "削除", court: "コート", register_score: "結果登録", registered: "✓ スコア登録完了",
        edit_players: "✍️ メンバー変更", save_players: "💾 変更を確定", all_clubs: "すべて表示"
    },
    en: {
        tab_play: "Today's Session", tab_members: "Members", tab_groups: "Clubs/Sessions", tab_history: "History",
        start_session: "Start Session", courts: "Courts:", btn_attendance: "Take Attendance",
        attendance_mgmt: "Attendance & Payment", btn_show_qr: "📱 Show QR", filter_club: "Filter by Club:",
        match_settings: "Match Settings", mode_select: "Mode:",
        mode_even: "Even Power (Ignore Gender / Dispersed)", mode_level_power: "Level-based (Ignore Gender)", mode_level_mixed: "Level-based (Prioritize Mixed)",
        btn_generate: "Generate Matches", current_games: "Current Games", btn_end_session: "End Session & Save",
        reg_member: "Register Member", edit_member: "Edit Member", male: "Male", female: "Female", club_none: "No Club",
        btn_add_member: "Add Member", btn_update: "Update Info", btn_cancel: "Cancel",
        member_list: "Member List", club_mgmt: "Club Management", btn_add_club: "Add Club",
        add_group: "Session Management", edit_group: "Edit Session Info", qr_upload: "Payment QR (Optional):",
        btn_add_group: "Add Session", history_title: "Session History", btn_close: "Close",
        status_present: "Present", status_absent: "Rest", pay_done: "Paid", pay_wait: "Unpaid",
        play_count: "Games", no_members: "No members found.", no_groups: "No data.",
        btn_edit: "Edit", btn_delete: "Delete", court: "Court", register_score: "Submit Score", registered: "✓ Score Saved",
        edit_players: "✍️ Edit Players", save_players: "💾 Save Changes", all_clubs: "Show All"
    }
};

const app = {
    lang: 'ja',
    members: [], clubs: [], groups: [], history: [], currentSession: null,
    editingMemberId: null, editingGroupName: null, tempQrData: '',
    isEditingMatch: false,
    K_FACTOR: 32,
    rankToRating: { 'A': 1600, 'B': 1500, 'C': 1400, 'D': 1300 },
    ratingToRank: { 1600: 'A', 1500: 'B', 1400: 'C', 1300: 'D' },

    t(key) {
        if(dict[this.lang] && dict[this.lang][key]) return dict[this.lang][key];
        if(dict['en'] && dict['en'][key]) return dict['en'][key];
        return key; 
    },

    changeLang(newLang) {
        this.lang = newLang; localStorage.setItem('bm_lang', newLang);
        document.querySelectorAll('[data-i18n]').forEach(el => { el.innerText = this.t(el.getAttribute('data-i18n')); });
        this.renderAll();
        if(this.currentSession) { this.renderAttendance(); this.renderMatches(); }
    },

    getRank(rating) {
        if (rating >= 1550) return 'A'; if (rating >= 1450) return 'B';
        if (rating >= 1350) return 'C'; return 'D';
    },

    init() {
        const savedLang = localStorage.getItem('bm_lang');
        if (savedLang) { this.lang = savedLang; document.getElementById('lang-select').value = savedLang; }
        this.changeLang(this.lang); 

        const savedMembers = localStorage.getItem('bm_members_v4');
        const savedClubs = localStorage.getItem('bm_clubs_v4');
        const savedGroups = localStorage.getItem('bm_groups_v4');
        const savedHistory = localStorage.getItem('bm_history_v4');
        
        // v3からのマイグレーション
        if (!savedMembers && localStorage.getItem('bm_members_v3')) {
            this.members = JSON.parse(localStorage.getItem('bm_members_v3'));
            let extractedClubs = new Set();
            this.members.forEach(m => {
                if(m.groups && m.groups.length > 0) { m.club = m.groups[0]; extractedClubs.add(m.club); } else { m.club = ''; }
                delete m.groups;
            });
            this.clubs = Array.from(extractedClubs);
            this.groups = JSON.parse(localStorage.getItem('bm_groups_v3') || '[]').map(g => typeof g === 'string' ? {name: g, qrData: ''} : g);
            this.history = JSON.parse(localStorage.getItem('bm_history_v3') || '[]');
            this.saveData(); // 新形式で保存
        } else {
            if (savedMembers) this.members = JSON.parse(savedMembers);
            if (savedClubs) this.clubs = JSON.parse(savedClubs);
            if (savedGroups) this.groups = JSON.parse(savedGroups);
            if (savedHistory) this.history = JSON.parse(savedHistory);
        }

        this.members.forEach(m => { if (!m.rating) m.rating = 1400; if(!m.club) m.club = ''; });

        document.getElementById('new-group-qr').addEventListener('change', (e) => {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height;
                    if (w > h) { if (w > 400) { h *= 400 / w; w = 400; } } else { if (h > 400) { w *= 400 / h; h = 400; } }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    app.tempQrData = canvas.toDataURL('image/jpeg', 0.8);
                    document.getElementById('qr-preview').src = app.tempQrData; document.getElementById('qr-preview').style.display = 'block';
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        });
        
        this.renderAll();
    },

    saveData() {
        localStorage.setItem('bm_members_v4', JSON.stringify(this.members));
        localStorage.setItem('bm_clubs_v4', JSON.stringify(this.clubs));
        localStorage.setItem('bm_groups_v4', JSON.stringify(this.groups));
        localStorage.setItem('bm_history_v4', JSON.stringify(this.history));
    },

    renderAll() {
        this.renderClubs();
        this.renderGroups();
        this.renderDatabase();
        this.renderHistory();
        this.updateSelects();
    },

    switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        const activeBtn = document.querySelector(`.tab-btn[onclick="app.switchTab('${tabId}')"]`);
        if(activeBtn) activeBtn.classList.add('active');
    },

    // --- クラブ管理 ---
    addClub() {
        const name = document.getElementById('new-club-name').value.trim();
        if (!name || this.clubs.includes(name)) return;
        this.clubs.push(name);
        document.getElementById('new-club-name').value = '';
        this.saveData(); this.renderAll();
    },
    deleteClub(name) {
        if(confirm(`Delete ${name}?`)) {
            this.clubs = this.clubs.filter(c => c !== name);
            this.members.forEach(m => { if(m.club === name) m.club = ''; });
            this.saveData(); this.renderAll();
        }
    },
    renderClubs() {
        const ui = document.getElementById('club-list-ui');
        ui.innerHTML = this.clubs.map(c => `
            <div style="border-bottom: 1px solid #eee; padding: 5px 0; display: flex; justify-content: space-between;">
                <span>${c}</span> <button class="btn-danger" style="padding: 2px 5px; font-size: 0.8rem;" onclick="app.deleteClub('${c}')">${this.t('btn_delete')}</button>
            </div>
        `).join('') || `<p style="color:#777;">${this.t('no_groups')}</p>`;
    },

    // --- 練習会(Group)管理 ---
    submitGroup() {
        const name = document.getElementById('new-group-name').value.trim();
        if (!name) return;
        if (this.editingGroupName) {
            const g = this.groups.find(x => x.name === this.editingGroupName);
            if (g) { g.name = name; if (this.tempQrData) g.qrData = this.tempQrData; }
        } else {
            if (this.groups.some(g => g.name === name)) return;
            this.groups.push({ name: name, qrData: this.tempQrData });
        }
        this.resetGroupForm(); this.saveData(); this.renderAll();
    },
    editGroup(groupName) {
        const g = this.groups.find(x => x.name === groupName);
        if (!g) return;
        this.editingGroupName = groupName;
        document.getElementById('group-form-title').innerText = this.t('edit_group');
        document.getElementById('new-group-name').value = g.name;
        this.tempQrData = g.qrData || '';
        if (this.tempQrData) { document.getElementById('qr-preview').src = this.tempQrData; document.getElementById('qr-preview').style.display = 'block'; } 
        else { document.getElementById('qr-preview').style.display = 'none'; }
        
        const btn = document.getElementById('submit-group-btn');
        btn.innerText = this.t('btn_update'); btn.classList.add('btn-edit');
        document.getElementById('cancel-group-edit-btn').style.display = 'inline-block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    },
    resetGroupForm() {
        this.editingGroupName = null; this.tempQrData = '';
        document.getElementById('group-form-title').innerText = this.t('add_group');
        document.getElementById('new-group-name').value = ''; document.getElementById('new-group-qr').value = '';
        document.getElementById('qr-preview').style.display = 'none';
        const btn = document.getElementById('submit-group-btn');
        btn.innerText = this.t('btn_add_group'); btn.classList.remove('btn-edit');
        document.getElementById('cancel-group-edit-btn').style.display = 'none';
    },
    deleteGroup(groupName) {
        if(confirm(`Delete ${groupName}?`)) {
            this.groups = this.groups.filter(g => g.name !== groupName);
            this.saveData(); this.renderAll();
        }
    },
    renderGroups() {
        const ui = document.getElementById('group-list-ui');
        ui.innerHTML = this.groups.map(g => `
            <div style="border-bottom: 1px solid #eee; padding: 10px 0; display: flex; justify-content: space-between; align-items: center;">
                <div style="display:flex; align-items:center; gap: 10px;">

        // 出欠フィルター用
        const filterSelect = document.getElementById('attendance-filter-club');
        filterSelect.innerHTML = `<option value="">-- ${this.t('all_clubs')} --</option>` + this.clubs.map(c => `<option value="${c}">${c}</option>`).join('');

        // 練習会選択（セッション開始用）
        const playSelect = document.getElementById('session-group-select');
        playSelect.innerHTML = this.groups.length > 0 ? '' : `<option value="">--</option>`;
        this.groups.forEach(g => { playSelect.innerHTML += `<option value="${g.name}">${g.name}</option>`; });
    },

    // --- 名簿管理 ---
    submitMember() {
        const name = document.getElementById('new-name').value.trim();
        const gender = document.getElementById('new-gender').value;
        const rank = document.getElementById('new-rank').value;
        const club = document.getElementById('new-club-select').value;
        if (!name) return;

        if (this.editingMemberId) {
            const m = this.members.find(x => x.id === this.editingMemberId);
            if (m) { m.name = name; m.gender = gender; m.rating = this.rankToRating[rank]; m.club = club; }
        } else {
            this.members.push({ id: Date.now(), name, gender, club: club, rating: this.rankToRating[rank], active: false, playCount: 0 });
        }
        this.resetForm(); this.saveData(); this.renderDatabase();
    },
